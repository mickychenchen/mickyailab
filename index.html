<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab - Live</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui; margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 2rem; }
        h1 { color: #38bdf8; margin: 0; }
        .control-panel { background: #1e293b; padding: 1.5rem; border-radius: 1rem; border: 1px solid #334155; width: 100%; max-width: 600px; display: flex; gap: 0.5rem; }
        input { flex: 1; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #475569; background: #0f172a; color: white; }
        button { padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; width: 100%; max-width: 1200px; margin-top: 2rem; }
        .artwork { position: relative; border-radius: 0.75rem; overflow: hidden; border: 1px solid #334155; cursor: zoom-in; }
        .artwork img { width: 100%; height: auto; display: block; }
        /* Lightbox Style */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Micky AI Lab</h1>
        <p style="color:#94a3b8">雲端即時渲染 · 本地不留痕跡</p>
    </div>
    <div class="control-panel">
        <input type="text" id="promptInput" placeholder="輸入想像的畫面..." value="A cyberpunk city neon lights">
        <button onclick="generate()">生成圖片</button>
    </div>
    <div class="gallery" id="gallery"></div>
    <div id="lightbox" onclick="this.style.display='none'"><img id="lbImg"></div>

    <script>
        function generate() {
            const prompt = document.getElementById('promptInput').value;
            const gallery = document.getElementById('gallery');
            const seed = Math.floor(Math.random() * 999999);
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true`;
            
            const div = document.createElement('div');
            div.className = 'artwork';
            div.innerHTML = `<img src="${url}" onclick="view('${url}')">`;
            gallery.prepend(div);
        }
        function view(url) {
            document.getElementById('lbImg').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
