<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab | AI Generator</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.6; }
        .neon-glow { text-shadow: 0 0 10px rgba(168, 85, 247, 0.8); }
        @keyframes pulse-purple { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .loading-text { animation: pulse-purple 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans selection:bg-purple-500/30 overflow-x-hidden">
    <video autoplay loop muted playsinline class="hero-video"><source src="/hero.mp4" type="video/mp4"></video>
    <div class="fixed inset-0 bg-gradient-to-b from-slate-950/40 via-slate-950/60 to-slate-950 -z-10"></div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-3xl font-black italic tracking-tighter text-purple-500 neon-glow uppercase">Micky AI Lab</div>
        <a href="https://www.facebook.com/share/18SJHd54fs/" target="_blank" class="glass px-4 py-2 rounded-full text-xs uppercase tracking-widest hover:bg-purple-500/20 transition">Facebook Page</a>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-20 pb-24 text-center">
        <h1 class="text-6xl md:text-8xl font-black mb-6 tracking-tight text-white uppercase">Imagine <span class="text-purple-500">Fast</span></h1>
        <p class="text-slate-400 text-xl mb-12 max-w-2xl mx-auto">Cloudflare Workers AI 驅動的極速渲染實驗室。</p>

        <div class="glass p-3 rounded-3xl flex flex-col md:flex-row gap-3 mb-16 shadow-2xl">
            <input type="text" id="promptInput" placeholder="輸入你的描述詞... (例如: Cyberpunk Sydney)" 
                class="bg-transparent flex-grow px-6 py-5 outline-none text-white text-lg placeholder:text-slate-500">
            <button id="genBtn" class="bg-purple-600 hover:bg-purple-500 text-white px-12 py-5 rounded-2xl font-bold text-lg transition-all active:scale-95 shadow-lg shadow-purple-500/20">生成圖像</button>
        </div>

        <div id="resultContainer" class="hidden space-y-8">
            <div class="relative rounded-3xl overflow-hidden shadow-2xl border border-white/10 glass">
                <img id="resultImg" src="" alt="Generated Image" class="w-full h-auto min-h-[400px] bg-slate-900/50">
                <div id="loadingOverlay" class="absolute inset-0 flex items-center justify-center bg-slate-950/90 hidden">
                    <div class="text-center">
                        <div class="w-16 h-16 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mx-auto mb-6"></div>
                        <p class="text-purple-400 font-bold tracking-widest text-lg loading-text uppercase">正在注入 AI 靈魂...</p>
                    </div>
                </div>
            </div>
            <button id="downloadBtn" class="glass px-8 py-3 rounded-xl text-sm font-medium hover:bg-white/10 transition">下載這件藝術品</button>
        </div>
    </main>

    <footer class="text-center pb-12 text-slate-600 text-xs tracking-widest">
        &copy; 2026 MICKY AI LAB | SYDNEY HQ
    </footer>

    <script>
        const genBtn = document.getElementById('genBtn');
        const promptInput = document.getElementById('promptInput');
        const resultContainer = document.getElementById('resultContainer');
        const resultImg = document.getElementById('resultImg');
        const loadingOverlay = document.getElementById('loadingOverlay');

        async function generate() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            genBtn.disabled = true;
            genBtn.innerText = '處理中...';
            resultContainer.classList.remove('hidden');
            loadingOverlay.classList.remove('hidden');
            
            const apiUrl = ;

            try {
                resultImg.src = apiUrl;
                resultImg.onload = () => {
                    loadingOverlay.classList.add('hidden');
                    genBtn.disabled = false;
                    genBtn.innerText = '生成圖像';
                };
            } catch (err) {
                alert('實驗室暫時過載，請稍後再試。');
                genBtn.disabled = false;
                genBtn.innerText = '生成圖像';
            }
        }

        genBtn.addEventListener('click', generate);
        promptInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') generate(); });
        document.getElementById('downloadBtn').onclick = () => {
            const link = document.createElement('a');
            link.href = resultImg.src;
            link.download = 'micky-ai-art.png';
            link.click();
        };
    </script>
</body>
</html>
