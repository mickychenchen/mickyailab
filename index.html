<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab - Official API Ver.</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui; margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .control-panel { background: #1e293b; padding: 1.5rem; border-radius: 1rem; border: 1px solid #334155; width: 100%; max-width: 600px; display: flex; gap: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        input { flex: 1; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        button { padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1200px; margin-top: 2rem; }
        .artwork { background: #1e293b; border-radius: 0.75rem; overflow: hidden; border: 1px solid #334155; position: relative; }
        .artwork img { width: 100%; height: auto; display: block; background: #0f172a; min-height: 300px; }
        .status-tag { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>
    <h1 style="color: #38bdf8;">Micky AI Lab</h1>
    <p style="color: #94a3b8;">使用官方 gen.pollinations.ai 直連技術</p>
    <div class="control-panel">
        <input type="text" id="promptInput" placeholder="例如: a cute walking banana" value="a cute walking banana, 3d render, high quality">
        <button onclick="generate()">召喚圖像</button>
    </div>
    <div id="gallery" class="gallery"></div>
    <script>
        function generate() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;
            
            const seed = Math.floor(Math.random() * 99999);
            // 改為呼叫本地代理伺服器，以保護 API KEY 並避免客戶端直連
            const proxyUrl = `http://localhost:3001/generate-image?prompt=${encodeURIComponent(prompt)}&seed=${seed}&model=flux`;
            
            const gallery = document.getElementById('gallery');
            const div = document.createElement('div');
            div.className = 'artwork';
            div.innerHTML = `
                <div class="status-tag">AI Generating...</div>
                <img src="${proxyUrl}" onload="this.previousElementSibling.innerText='Flux Engine (via Proxy)'" onerror="this.previousElementSibling.innerText='Error'">
            `;
            gallery.prepend(div);
        }
    </script>
</body>
</html>
