<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; margin: 0; padding: 2rem; }
        .header { text-align: center; margin-bottom: 3rem; }
        h1 { color: #38bdf8; font-size: 2.5rem; }
        .status { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 9999px; background: #064e3b; color: #4ade80; font-size: 0.875rem; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
        .artwork { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; overflow: hidden; transition: transform 0.2s; }
        .artwork:hover { transform: scale(1.03); }
        .artwork img { width: 100%; height: auto; display: block; }
        .artwork p { padding: 0.75rem; margin: 0; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Micky AI Lab</h1>
        <div class="status">● 畫廊動態更新中</div>
    </div>
    <div class="gallery" id="gallery">
        
    </div>
    <script>
        fetch('images.json').then(r => r.json()).then(images => {
            const container = document.getElementById('gallery');
            images.reverse().forEach(img => {
                const div = document.createElement('div');
                div.className = 'artwork';
                div.innerHTML = `<img src="${img.path}"><p>${img.prompt}</p>`;
                container.appendChild(div);
            });
        }).catch(e => console.log('尚未有畫作數據'));
    </script>
</body>
</html>
