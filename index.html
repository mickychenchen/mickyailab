<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab - Pro</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui; margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .control-panel { background: #1e293b; padding: 1.5rem; border-radius: 1rem; border: 1px solid #334155; width: 100%; max-width: 600px; display: flex; gap: 0.5rem; margin-top: 20px; }
        input { flex: 1; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #475569; background: #0f172a; color: white; }
        button { padding: 0.75rem 1.5rem; border-radius: 0.5rem; border: none; background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; width: 100%; max-width: 1200px; margin-top: 2rem; }
        .artwork { border-radius: 0.75rem; overflow: hidden; border: 1px solid #334155; transition: 0.3s; }
        .artwork:hover { border-color: #38bdf8; }
        .artwork img { width: 100%; height: auto; display: block; }
        #loading { display: none; color: #38bdf8; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Micky AI Lab</h1>
    <div class="control-panel">
        <input type="text" id="promptInput" placeholder="請輸入精確的英文描述..." value="Futuristic Tokyo street, rainy night, cinematic lights">
        <button onclick="generate()">立即生成</button>
    </div>
    <div id="loading">⏳ 正在與 Pollinations 進行 Pollen 交換...</div>
    <div class="gallery" id="gallery"></div>
    <script>
        function generate() {
            const prompt = document.getElementById('promptInput').value;
            const loader = document.getElementById('loading');
            const gallery = document.getElementById('gallery');
            loader.style.display = 'block';
            
            const seed = Math.floor(Math.random() * 1000000);
            // 根據文件使用正確的 API 端點
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}&nologo=true&enhance=true`;

            const img = new Image();
            img.src = imageUrl;
            img.onload = () => {
                loader.style.display = 'none';
                const div = document.createElement('div');
                div.className = 'artwork';
                div.innerHTML = `<img src="${imageUrl}">`;
                gallery.prepend(div);
            };
            img.onerror = () => {
                loader.innerText = '❌ 生成失敗，請檢查網路環境';
            };
        }
    </script>
</body>
</html>
