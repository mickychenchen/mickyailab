<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab | Vision to Reality</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; }
        .glass-panel { background: rgba(15, 15, 15, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .neon-text { color: #bc13fe; text-shadow: 0 0 10px rgba(188, 19, 254, 0.5); }
        .neon-border { border: 1px solid #bc13fe; box-shadow: inset 0 0 5px #bc13fe, 0 0 5px #bc13fe; }
        video#bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; filter: brightness(0.4); }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #bc13fe; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-white font-sans antialiased overflow-hidden">
    <video id="bg-video" autoplay muted loop playsinline>
        <source src="hero.mp4" type="video/mp4">
    </video>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6">
        <div class="glass-panel p-10 rounded-[2.5rem] w-full max-w-lg transition-all duration-500 hover:scale-[1.01]">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">Micky <span class="neon-text">AI Lab</span></h1>
                    <p class="text-gray-400 text-sm mt-1">Visionary Creative Console</p>
                </div>
                <a href="https://www.facebook.com/share/18SJHd54fs/" target="_blank" class="p-2 bg-white/5 hover:bg-white/10 rounded-full transition-colors">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </a>
            </div>

            <div class="space-y-6">
                <input type="text" id="prompt" placeholder="敘述你的視覺靈感..." 
                       class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all text-lg">
                
                <button onclick="generateImage()" id="genBtn" 
                        class="w-full bg-white text-black font-bold py-4 rounded-2xl hover:bg-purple-100 transition-all flex items-center justify-center space-x-2 active:scale-95">
                    <span>✨ 開始生成</span>
                </button>

                <div id="result" class="mt-8 rounded-2xl overflow-hidden min-h-[300px] flex items-center justify-center bg-black/20 border border-white/5">
                    <p class="text-gray-500 italic">生成的藝術品將呈現於此</p>
                </div>
            </div>
        </div>
        <footer class="mt-10 text-white/30 text-xs tracking-widest uppercase">
            Sydney | 2026 Micky AI Collective
        </footer>
    </main>

    <script>
        async function generateImage() {
            const btn = document.getElementById('genBtn');
            const prompt = document.getElementById('prompt').value;
            const resultDiv = document.getElementById('result');
            if(!prompt) return;
            
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>生成中...</span>';
            resultDiv.innerHTML = '<div class="text-center"><p class="text-purple-400 animate-pulse font-medium">正在與雲端神經網路通訊...</p></div>';

            try {
                // 指向 Vercel 絕對路徑以避免 Beta 環境 404
                const response = await fetch('https://mickyailab.vercel.app/api/generate-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await response.json();
                if(data.url) {
                    resultDiv.innerHTML = `<img src="${data.url}" class="w-full h-auto animate-in fade-in zoom-in duration-700">`;
                } else {
                    throw new Error('API 回傳格式錯誤');
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="p-4 text-red-400 text-sm bg-red-400/10 rounded-xl">系統暫時忙碌: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>✨ 開始生成</span>';
            }
        }
    </script>
</body>
</html>
