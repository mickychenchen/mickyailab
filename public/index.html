<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab | Future Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-video { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; width: auto; height: auto; z-index: -1; transform: translate(-50%, -50%); object-fit: cover; }
        .artwork-img { min-height: 200px; background: #111; }
    </style>
</head>
<body class="bg-[#050505] text-white selection:bg-cyan-500 selection:text-black">
    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <video autoplay muted loop playsinline class="hero-video">
            <source src="/hero.mp4" type="video/mp4">
        </video>
        <div class="absolute top-0 left-0 w-full h-full bg-black/50 z-[0]"></div>
        <div class="container mx-auto px-6 text-center relative z-10">
            <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-8 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-400">MICKY AI LAB</h1>
            <p class="text-xl md:text-2xl text-gray-400 max-w-2xl mx-auto mb-12 font-light tracking-wide">Synchronizing human creativity with neural precision.</p>
            <a href="#features" class="px-8 py-4 bg-white text-black rounded-full font-semibold hover:bg-cyan-400 transition-all duration-300">Explore Intelligence</a>
        </div>
    </section>

    <section id="features" class="py-24 px-6 bg-[#050505]">
        <div class="container mx-auto">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
                <div class="glass p-10 rounded-3xl border-cyan-500/30">
                    <h3 class="text-2xl font-bold mb-4 text-cyan-400">Flux Generation</h3>
                    <p class="text-gray-500 mb-6">Next-gen image synthesis powered by Micky-Painter v2.0.</p>
                    <div class="flex flex-col gap-3">
                        <input type="text" id="promptInput" placeholder="Imagine something..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-cyan-500 transition-all text-sm">
                        <button onclick="generate()" class="w-full py-3 bg-cyan-500 text-black rounded-xl font-bold hover:bg-cyan-400 transition-all active:scale-95">Generate Image</button>
                    </div>
                </div>
                <div class="glass p-10 rounded-3xl opacity-50">
                    <h3 class="text-2xl font-bold mb-4 text-purple-400">Agent Browser</h3>
                    <p class="text-gray-500">Autonomous web intelligence (Coming Soon).</p>
                </div>
                <div class="glass p-10 rounded-3xl opacity-50">
                    <h3 class="text-2xl font-bold mb-4 text-amber-400">System Sync</h3>
                    <p class="text-gray-500">Seamless long-term memory (Coming Soon).</p>
                </div>
            </div>
            <div id="gallery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <script>
        function generate() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;
            const seed = Math.floor(Math.random() * 99999);
            const proxyUrl = `/api/generate-image?prompt=${encodeURIComponent(prompt)}&seed=${seed}&model=flux`;
            const gallery = document.getElementById('gallery');
            const div = document.createElement('div');
            div.className = 'glass p-4 rounded-2xl animate-pulse';
            div.innerHTML = `<div class="text-xs text-cyan-500 mb-2 uppercase tracking-widest">Neural Processing...</div><img src="${proxyUrl}" class="w-full rounded-xl artwork-img" onload="this.parentElement.classList.remove('animate-pulse'); this.previousElementSibling.innerText='Flux Engine Active'" onerror="this.previousElementSibling.innerText='Engine Offline'">`;
            gallery.prepend(div);
        }
    </script>
    
    <div id="ai-container" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(0,0,0,0.7); pading: 20px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 500px; padding: 15px; text-align: center;">
        <input type="text" id="cf-prompt" placeholder="輸入 AI 繪圖提示詞..." style="width: 70%; padding: 10px; border-radius: 5px; border: none; outline: none;">
        <button id="cf-gen-btn" onclick="handleGeneration()" style="width: 25%; padding: 10px; background: #f39c12; color: white; border: none; border-radius: 5px; cursor: pointer;">生成</button>
        <div id="cf-result" style="margin-top: 15px; display: none;">
            <img id="cf-img" src="" style="width: 100%; border-radius: 10px; border: 2px solid #f39c12;">
        </div>
    </div>
    <script src="/cloudflare-handler.js"></script>
    <script>
        async function handleGeneration() {
            const prompt = document.getElementById("cf-prompt").value;
            const btn = document.getElementById("cf-gen-btn");
            const resDiv = document.getElementById("cf-result");
            const img = document.getElementById("cf-img");
            if(!prompt) return alert("請輸入提示詞！");
            
            btn.innerText = "繪製中...";
            btn.disabled = true;
            
            try {
                const base64 = await generateCloudflareImage(prompt);
                img.src = base64;
                resDiv.style.display = "block";
            } catch (e) {
                alert("生成失敗，請檢查後端日誌");
            } finally {
                btn.innerText = "生成";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
