<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab | 創意奇點</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #bc13fe; --glass: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: #000; color: white; overflow-x: hidden; scroll-snap-type: y mandatory; }
        section { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* Section 1: Hero Cinema */
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; filter: brightness(0.6); }
        .hero-content { text-align: center; z-index: 1; }
        .hero-content h1 { font-size: 5rem; font-weight: 800; letter-spacing: -2px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scroll-indicator { position: absolute; bottom: 30px; animation: bounce 2s infinite; font-size: 1.5rem; opacity: 0.7; }

        /* Section 2: Creative Console */
        .console-container { width: 90%; max-width: 1000px; background: var(--glass); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 50px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .input-group { position: relative; margin-top: 30px; }
        input { width: 100%; padding: 20px 25px; background: rgba(0,0,0,0.3); border: 1px solid rgba(188, 19, 254, 0.3); border-radius: 15px; color: white; font-size: 1.1rem; transition: all 0.3s; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px rgba(188, 19, 254, 0.2); }
        button { margin-top: 20px; width: 100%; padding: 18px; background: var(--accent); border: none; border-radius: 15px; color: white; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }
        button:disabled { background: #444; cursor: not-allowed; }
        #result-container { margin-top: 30px; border-radius: 15px; overflow: hidden; display: none; }
        #result-img { width: 100%; border-radius: 15px; border: 1px solid var(--accent); }

        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body>
    <section>
        <video class="hero-bg" autoplay loop muted playsinline><source src="/beta/hero.mp4" type="video/mp4"></video>
        <div class="hero-content">
            <h1>MICKY AI LAB</h1>
            <p style="font-size: 1.2rem; opacity: 0.8; letter-spacing: 4px;">WHERE IMAGINATION MEETS LIGHTNING</p>
        </div>
        <div class="scroll-indicator"><i class="fas fa-chevron-down"></i></div>
    </section>

    <section id="generator">
        <div class="console-container">
            <h2 style="font-size: 2rem; border-left: 4px solid var(--accent); padding-left: 15px;">創世控制台</h2>
            <div class="input-group">
                <input type="text" id="prompt" placeholder="描述你腦中的奇想 (例如: Neon Samurai in Cyberpunk Sydney)">
                <button id="gen-btn" onclick="generateImage()">開始生成</button>
            </div>
            <div id="status" style="margin-top: 15px; text-align: center; color: var(--accent);"></div>
            <div id="result-container"><img id="result-img" src="" alt="AI Result"></div>
        </div>
    </section>

    <script>
        async function generateImage() {
            const btn = document.getElementById('gen-btn');
            const prompt = document.getElementById('prompt').value;
            const status = document.getElementById('status');
            if(!prompt) return alert('請輸入描述！');

            btn.disabled = true; btn.innerText = '量產維度中...';
            status.innerText = '⚡ 正在調用 Cloudflare GPU 加速器...';

            try {
                const response = await fetch('/api/generate-image', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ promptText: prompt })
                });
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                document.getElementById('result-container').style.display = 'block';
                document.getElementById('result-img').src = url;
                status.innerText = '✨ 生成成功！';
            } catch (e) {
                status.innerText = '❌ 能量波動異常，請重試';
            } finally {
                btn.disabled = false; btn.innerText = '開始生成';
            }
        }
    </script>
</body>
</html>
