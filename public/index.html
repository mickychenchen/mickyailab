<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab | Dual Engine</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }
        #hero-video { position: fixed; top: 0; left: 0; min-width: 100%; min-height: 100%; z-index: -1; filter: brightness(0.4); object-fit: cover; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .header { margin-bottom: 40px; text-align: center; text-transform: uppercase; letter-spacing: 5px; }
        .main-grid { display: flex; gap: 25px; width: 100%; max-width: 1100px; flex-wrap: wrap; justify-content: center; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px; padding: 30px; flex: 1; min-width: 320px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; }
        .card-title { font-size: 1.2rem; font-weight: 700; color: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .card-title::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #f39c12; }
        .cf-theme::before { background: #2980b9; }
        input { background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.2); padding: 14px; border-radius: 12px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: #f39c12; background: rgba(0,0,0,0.4); }
        button { padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        .btn-flux { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; }
        .btn-cf { background: linear-gradient(135deg, #3498db, #2980b9); color: white; }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }
        #result-display { margin-top: 30px; display: none; text-align: center; }
        #result-display img { max-width: 100%; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <video autoplay muted loop id="hero-video"><source src="/hero.mp4" type="video/mp4"></video>
    <div class="container">
        <div class="header"><h1>Micky AI Lab</h1></div>
        <div class="main-grid">
            <div class="glass-card">
                <div class="card-title">Flux Generation</div>
                <input type="text" id="flux-prompt" placeholder="Flux model prompt...">
                <button class="btn-flux" onclick="runFlux()">Generate Flux</button>
            </div>
            <div class="glass-card">
                <div class="card-title cf-theme">Cloudflare AI</div>
                <input type="text" id="cf-prompt" placeholder="CF Workers AI prompt...">
                <button class="btn-cf" onclick="runCF()">Generate CF</button>
            </div>
        </div>
        <div id="result-display">
            <p id="status-text"></p>
            <img id="main-img" src="" alt="AI Generation">
        </div>
    </div>
    <script src="/cloudflare-handler.js"></script>
    <script>
        const display = document.getElementById('result-display');
        const mainImg = document.getElementById('main-img');
        const status = document.getElementById('status-text');
        async function runFlux() {
            const prompt = document.getElementById('flux-prompt').value;
            if(!prompt) return;
            status.innerText = "Flux Engine Initializing...";
            display.style.display = 'block';
            try {
                const response = await fetch('/api/generate-image', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ prompt }) });
                const data = await response.json();
                mainImg.src = data.url || data.image;
                status.innerText = "Flux Generation Complete";
            } catch (e) { status.innerText = "Flux Error: " + e.message; }
        }
        async function runCF() {
            const prompt = document.getElementById('cf-prompt').value;
            if(!prompt) return;
            status.innerText = "Cloudflare AI Dreaming...";
            display.style.display = 'block';
            try {
                const base64 = await generateCloudflareImage(prompt);
                mainImg.src = base64;
                status.innerText = "CF Generation Complete";
            } catch (e) { status.innerText = "CF Error: " + e.message; }
        }
    </script>
</body>
</html>
