<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micky AI Lab | Creative Workspace</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.5; }
        .neon-border { transition: 0.3s; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); }
        .neon-border:focus-within { box-shadow: 0 0 30px rgba(168, 85, 247, 0.5); border-color: rgba(168, 85, 247, 0.5); }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-purple { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .loading-text { animation: pulse-purple 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans selection:bg-purple-500/30 overflow-x-hidden">
    <video autoplay loop muted playsinline class="hero-video"><source src="/hero.mp4" type="video/mp4"></video>
    <div class="fixed inset-0 bg-slate-950/40 -z-10"></div>

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-2xl font-black tracking-tighter text-purple-500 uppercase">Micky AI Lab</div>
        <div class="flex gap-4">
            <span class="text-[10px] bg-purple-500/20 text-purple-400 px-2 py-1 rounded border border-purple-500/30 uppercase tracking-widest">Serverless Mode</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-12 pb-24">
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl font-black mb-4 bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-500 uppercase italic">Vision to Reality</h1>
            <p class="text-slate-400 tracking-widest text-sm uppercase">Cloudflare SDXL-Lightning 驅動的極速實驗室</p>
        </header>

        <div class="glass p-2 rounded-3xl flex flex-col md:flex-row gap-2 mb-12 neon-border">
            <input type="text" id="promptInput" placeholder="描述你腦中的畫面... (例如: Neon Samurai in Sydney)" 
                class="bg-transparent flex-grow px-6 py-5 outline-none text-white text-lg placeholder:text-slate-600">
            <button id="genBtn" class="bg-purple-600 hover:bg-purple-500 text-white px-10 py-5 rounded-2xl font-bold transition-all active:scale-95 shadow-xl shadow-purple-900/20">
                立即生成
            </button>
        </div>

        <div id="outputArea" class="min-h-[400px] flex flex-col items-center justify-center">
            <div id="placeholder" class="text-slate-600 text-center py-20 border-2 border-dashed border-slate-800 rounded-3xl w-full">
                <p class="italic">等待指令中...</p>
            </div>

            <div id="resultWrapper" class="hidden w-full space-y-6 fade-in">
                <div class="relative glass p-2 rounded-[2rem] overflow-hidden shadow-2xl">
                    <img id="resultImg" src="" alt="Generated Art" class="w-full h-auto rounded-[1.5rem] bg-slate-900">
                    <div id="loadingOverlay" class="absolute inset-0 flex items-center justify-center bg-slate-950/80 hidden">
                        <div class="text-center">
                            <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p class="text-purple-400 font-bold tracking-widest loading-text uppercase text-sm">計算中...</p>
                        </div>
                    </div>
                </div>
                <div class="flex justify-center gap-4">
                    <button id="saveBtn" class="glass px-10 py-4 rounded-2xl text-sm font-bold hover:bg-white/10 transition flex items-center gap-2">
                        <span>💾</span> 儲存這件作品
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center pb-8 text-slate-700 text-[10px] tracking-[0.3em] uppercase">
        &copy; 2026 Micky AI Lab // Privacy-First Client-Side Rendering
    </footer>

    <script>
        const genBtn = document.getElementById('genBtn');
        const promptInput = document.getElementById('promptInput');
        const resultWrapper = document.getElementById('resultWrapper');
        const placeholder = document.getElementById('placeholder');
        const resultImg = document.getElementById('resultImg');
        const loadingOverlay = document.getElementById('loadingOverlay');

        async function generate() {
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            genBtn.disabled = true;
            genBtn.classList.add('opacity-50', 'cursor-not-allowed');
            placeholder.classList.add('hidden');
            resultWrapper.classList.remove('hidden');
            loadingOverlay.classList.remove('hidden');

            try {
                const response = await fetch();
                if (!response.ok) throw new Error('API Error');
                
                const blob = await response.blob();
                const objectURL = URL.createObjectURL(blob);
                
                resultImg.src = objectURL;
                resultImg.onload = () => {
                    loadingOverlay.classList.add('hidden');
                    genBtn.disabled = false;
                    genBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                };
            } catch (err) {
                alert('生成失敗，請檢查網路連線或稍後再試。');
                genBtn.disabled = false;
                genBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                loadingOverlay.classList.add('hidden');
            }
        }

        genBtn.addEventListener('click', generate);
        promptInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') generate(); });
        document.getElementById('saveBtn').onclick = () => {
            if (!resultImg.src) return;
            const link = document.createElement('a');
            link.href = resultImg.src;
            link.download = `MickyAI_\${Date.now()}.png\`;
            link.click();
        };
    </script>
</body>
</html>
